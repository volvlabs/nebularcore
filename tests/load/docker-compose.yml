services:
  server:
    build:
      context: ../..
      dockerfile: tests/load/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=load-test-secret
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    sysctls:
      - net.core.somaxconn=65535

  k6:
    image: grafana/k6:latest
    volumes:
      - ./k6:/scripts
    environment:
      - WS_URL=ws://server:8080/ws
    depends_on:
      server:
        condition: service_started
    entrypoint: ["k6", "run", "/scripts/websocket_load.js", "--summary-export=/scripts/results.json"]
    deploy:
      resources:
        limits:
          memory: 4G
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
