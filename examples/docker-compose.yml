version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .variables.env
    ports:
      - "5432:5432"
    networks:
      - default
    volumes:
      - ./docker/postgres/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
networks:
  default:
    driver: bridge
