version: '3.8'

services:
  postgres:
    image: postgres
    restart: always
    env_file:
      - .variables.env
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
      - ./docker/postgres/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    ports:
      - "5432:5432"
  backend:
    image: volvlabs/volvlabs-ci-image:latest
    restart: always
    # command: "sh bin/run.sh"
    command: tail -f /dev/null
    build:
      context: .
    volumes:
      - ./:/home/app
    ports:
      - "8484:8484"
    depends_on:
      - postgres
volumes:
  cache:
    driver: local
